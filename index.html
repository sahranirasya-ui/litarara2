<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Siswa XII</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        p { color: #94a3b8; }
        .links { display: grid; gap: 10px; margin-top: 20px; }
        .btn { background: #38bdf8; color: #0f172a; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #7dd3fc; transform: translateY(-3px); }
        .todo { text-align: left; background: #334155; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .todo h3 { margin-top: 0; font-size: 1rem; color: #fbbf24; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Student Hub 🚀</h1>
        <p>Dashboard Persiapan Ujian & Kuliah</p>
        
        <div class="todo">
            <h3>📌 Agenda Siswa Kelas 12:</h3>
            <div>- Belajar untuk Ujian Sekolah</div>
            <div>- Cek pengumuman SNBP/SNBT</div>
            <div>- Latihan Coding Python</div>
        </div>

        <div class="links">
            <a href="https://paspor-akun.simpkb.id/" class="btn" target="_blank">Portal Pendidikan</a>
            <a href="https://snpmb.bppp.kemdikbud.go.id/" class="btn" target="_blank">Info Kampus (SNPMB)</a>
            <a href="https://pijarbelajar.id/" class="btn" target="_blank">Materi Belajar</a>
        </div>
    </div>
</body>
</html>
