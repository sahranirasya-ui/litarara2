<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi Siswa Pintar</title>

<style>
body{
font-family: Arial;
background:#f0f4f8;
margin:0;
padding:0;
}

header{
background:#2c7be5;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
background:#2c7be5;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5fd0;
}

.task{
display:flex;
justify-content:space-between;
background:#f8f9fa;
padding:10px;
margin-top:10px;
border-radius:5px;
}

.done{
text-decoration:line-through;
color:gray;
}

.note{
background:#fff8dc;
padding:10px;
margin-top:10px;
border-radius:5px;
}

.schedule{
background:#e8f4ff;
padding:10px;
margin-top:10px;
border-radius:5px;
}
</style>
</head>

<body>

<header>
<h1>📚 Aplikasi Siswa Pintar</h1>
<p>Membantu mengatur tugas, catatan, dan jadwal</p>
</header>

<div class="container">

<div class="card">
<h2>✅ Daftar Tugas</h2>
<input type="text" id="taskInput" placeholder="Masukkan tugas...">
<button onclick="addTask()">Tambah Tugas</button>
<div id="taskList"></div>
</div>

<div class="card">
<h2>📝 Catatan Pelajaran</h2>
<textarea id="noteInput" placeholder="Tulis catatan pelajaran..."></textarea>
<button onclick="addNote()">Simpan Catatan</button>
<div id="noteList"></div>
</div>

<div class="card">
<h2>📅 Jadwal Pelajaran</h2>
<input type="text" id="scheduleInput" placeholder="Contoh: Senin - Matematika">
<button onclick="addSchedule()">Tambah Jadwal</button>
<div id="scheduleList"></div>
</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let notes = JSON.parse(localStorage.getItem("notes")) || [];
let schedules = JSON.parse(localStorage.getItem("schedules")) || [];

function saveData(){
localStorage.setItem("tasks", JSON.stringify(tasks));
localStorage.setItem("notes", JSON.stringify(notes));
localStorage.setItem("schedules", JSON.stringify(schedules));
}

function renderTasks(){
let list = document.getElementById("taskList");
list.innerHTML="";

tasks.forEach((task,index)=>{
let div=document.createElement("div");
div.className="task";

div.innerHTML=`
<span class="${task.done?'done':''}" onclick="toggleTask(${index})">${task.text}</span>
<button onclick="deleteTask(${index})">❌</button>
`;

list.appendChild(div);
});
}

function addTask(){
let input=document.getElementById("taskInput");
if(input.value==="") return;

tasks.push({text:input.value,done:false});
input.value="";
saveData();
renderTasks();
}

function toggleTask(index){
tasks[index].done=!tasks[index].done;
saveData();
renderTasks();
}

function deleteTask(index){
tasks.splice(index,1);
saveData();
renderTasks();
}

function renderNotes(){
let list=document.getElementById("noteList");
list.innerHTML="";

notes.forEach(note=>{
let div=document.createElement("div");
div.className="note";
div.innerText=note;
list.appendChild(div);
});
}

function addNote(){
let input=document.getElementById("noteInput");
if(input.value==="") return;

notes.push(input.value);
input.value="";
saveData();
renderNotes();
}

function renderSchedules(){
let list=document.getElementById("scheduleList");
list.innerHTML="";

schedules.forEach(item=>{
let div=document.createElement("div");
div.className="schedule";
div.innerText=item;
list.appendChild(div);
});
}

function addSchedule(){
let input=document.getElementById("scheduleInput");
if(input.value==="") return;

schedules.push(input.value);
input.value="";
saveData();
renderSchedules();
}

renderTasks();
renderNotes();
renderSchedules();

</script>

</body>
</html>
